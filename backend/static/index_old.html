<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quant Terminal — Admin</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0E1117; color: #E5E5E5; font-family: 'IBM Plex Mono', monospace; padding: 20px; }
  h1 { font-size: 14px; color: #F4C430; letter-spacing: 3px; margin-bottom: 20px; }
  h2 { font-size: 11px; color: #6B7280; letter-spacing: 2px; margin: 20px 0 10px; }
  .card { background: #131720; border: 1px solid #1E2530; padding: 12px; margin-bottom: 8px; border-radius: 4px; }
  .card.active { border-color: #00C85340; }
  .card.inactive { opacity: 0.5; }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .label { font-size: 9px; color: #6B7280; letter-spacing: 1.5px; min-width: 80px; }
  input, select { background: #1E2530; border: 1px solid #252D3A; color: #E5E5E5; padding: 4px 8px; font-size: 11px; font-family: mono; border-radius: 2px; }
  input { width: 200px; }
  input.short { width: 80px; }
  button { padding: 4px 12px; font-size: 9px; font-weight: 600; letter-spacing: 1px; border: 1px solid #252D3A; border-radius: 2px; background: transparent; color: #E5E5E5; cursor: pointer; font-family: mono; }
  button:hover { background: #1E2530; }
  button.primary { border-color: #F4C43040; color: #F4C430; }
  button.danger { border-color: #FF3D0040; color: #FF3D00; }
  button.success { border-color: #00C85340; color: #00C853; }
  .status { font-size: 10px; color: #6B7280; margin-top: 10px; padding: 8px; background: #131720; border-radius: 4px; }
  .badge { font-size: 8px; padding: 2px 6px; border-radius: 2px; font-weight: 700; letter-spacing: 1px; }
  .badge.on { background: #00C85320; color: #00C853; }
  .badge.off { background: #FF3D0020; color: #FF3D00; }
  #health { margin-bottom: 20px; }
</style>
</head>
<body>

<h1>QUANT TERMINAL — ADMIN PANEL</h1>

<div id="health" class="card"></div>

<h2>MANAGED MATCHES</h2>
<div id="matches"></div>

<h2>ADD / UPDATE MATCH</h2>
<div class="card">
  <div class="row">
    <span class="label">MATCH ID</span>
    <input id="f_match_id" placeholder="e.g. 2915932 or demo">
  </div>
  <div class="row">
    <span class="label">LEAGUE</span>
    <input id="f_league" class="short" value="EPL">
    <span class="label">ROUND</span>
    <input id="f_round" class="short" placeholder="R28">
  </div>
  <div class="row">
    <span class="label">HOME NAME</span>
    <input id="f_home_name" placeholder="Arsenal">
    <span class="label">SHORT</span>
    <input id="f_home_short" class="short" placeholder="ARS">
  </div>
  <div class="row">
    <span class="label">AWAY NAME</span>
    <input id="f_away_name" placeholder="Chelsea">
    <span class="label">SHORT</span>
    <input id="f_away_short" class="short" placeholder="CHE">
  </div>
  <div class="row">
    <span class="label">HOME CN</span>
    <input id="f_home_name_cn" placeholder="阿森纳">
    <span class="label">AWAY CN</span>
    <input id="f_away_name_cn" placeholder="切尔西">
  </div>
  <div class="row">
    <span class="label">HOME ELO</span>
    <input id="f_home_elo" class="short" type="number" value="1500">
    <span class="label">AWAY ELO</span>
    <input id="f_away_elo" class="short" type="number" value="1500">
  </div>
  <div class="row">
    <span class="label">API-FOOTBALL ID</span>
    <input id="f_api_football_id" placeholder="Fixture ID from API-Football">
  </div>
  <div class="row">
    <span class="label">ODDS SPORT</span>
    <input id="f_odds_sport" value="soccer_epl" placeholder="soccer_epl">
  </div>
  <div class="row" style="margin-top: 8px;">
    <button class="primary" onclick="addMatch()">ADD / UPDATE MATCH</button>
  </div>
</div>

<div id="status" class="status" style="display:none;"></div>

<script>
const API = '/api';

async function loadHealth() {
  try {
    const r = await fetch(`${API}/health`);
    const d = await r.json();
    document.getElementById('health').innerHTML = `
      <div class="row">
        <span class="label">STATUS</span>
        <span style="color:#00C853;font-weight:700">${d.status.toUpperCase()}</span>
        <span class="label">MODE</span>
        <span>${d.demo_mode ? 'DEMO' : 'LIVE'}</span>
        <span class="label">MODEL</span>
        <span>${d.model_loaded ? 'LOADED' : 'NOT FOUND'}</span>
        <span class="label">MATCHES</span>
        <span>${d.active_matches}</span>
        <span class="label">WS CONNS</span>
        <span>${d.ws_connections}</span>
      </div>`;
  } catch(e) {
    document.getElementById('health').innerHTML = '<span style="color:#FF3D00">Backend unreachable</span>';
  }
}

async function loadMatches() {
  try {
    const r = await fetch(`${API}/admin/matches`);
    const matches = await r.json();
    const el = document.getElementById('matches');
    if (!matches.length) {
      el.innerHTML = '<div style="color:#3D4654;font-size:10px;">No matches configured</div>';
      return;
    }
    el.innerHTML = matches.map(m => `
      <div class="card ${m.active ? 'active' : 'inactive'}">
        <div class="row">
          <span class="badge ${m.active ? 'on' : 'off'}">${m.active ? 'ACTIVE' : 'OFF'}</span>
          <span style="font-weight:700;font-size:12px;">${m.home_short || '?'} vs ${m.away_short || '?'}</span>
          <span style="color:#6B7280;font-size:10px;">${m.league} ${m.round}</span>
          <span style="color:#3D4654;font-size:9px;">ID: ${m.match_id}</span>
        </div>
        <div class="row" style="font-size:9px;color:#6B7280;">
          ${m.home_name} vs ${m.away_name}
          ${m.home_name_cn ? ` (${m.home_name_cn} vs ${m.away_name_cn})` : ''}
          | Elo: ${m.home_elo}-${m.away_elo}
          ${m.api_football_id ? ` | API-ID: ${m.api_football_id}` : ''}
        </div>
        <div class="row" style="margin-top:6px;">
          <button class="${m.active ? 'danger' : 'success'}" onclick="toggleMatch('${m.match_id}')">${m.active ? 'DEACTIVATE' : 'ACTIVATE'}</button>
          <button class="danger" onclick="deleteMatch('${m.match_id}')">DELETE</button>
          <a href="/?match=${m.match_id}" target="_blank" style="color:#00C8FF;font-size:9px;text-decoration:none;">OPEN TERMINAL →</a>
        </div>
      </div>
    `).join('');
  } catch(e) {
    document.getElementById('matches').innerHTML = '<span style="color:#FF3D00">Failed to load</span>';
  }
}

async function addMatch() {
  const body = {
    match_id: document.getElementById('f_match_id').value,
    league: document.getElementById('f_league').value,
    round: document.getElementById('f_round').value,
    home_name: document.getElementById('f_home_name').value,
    away_name: document.getElementById('f_away_name').value,
    home_short: document.getElementById('f_home_short').value,
    away_short: document.getElementById('f_away_short').value,
    home_name_cn: document.getElementById('f_home_name_cn').value,
    away_name_cn: document.getElementById('f_away_name_cn').value,
    home_elo: parseInt(document.getElementById('f_home_elo').value) || 1500,
    away_elo: parseInt(document.getElementById('f_away_elo').value) || 1500,
    api_football_id: document.getElementById('f_api_football_id').value,
    odds_sport: document.getElementById('f_odds_sport').value,
    active: true,
  };
  if (!body.match_id) { showStatus('Match ID required', true); return; }
  try {
    await fetch(`${API}/admin/matches`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    showStatus(`Match ${body.match_id} added/updated`);
    loadMatches();
    loadHealth();
  } catch(e) { showStatus('Failed: ' + e, true); }
}

async function toggleMatch(id) {
  await fetch(`${API}/admin/matches/${id}/toggle`, { method: 'PUT' });
  loadMatches();
  loadHealth();
}

async function deleteMatch(id) {
  if (!confirm(`Delete match ${id}?`)) return;
  await fetch(`${API}/admin/matches/${id}`, { method: 'DELETE' });
  loadMatches();
  loadHealth();
}

function showStatus(msg, error) {
  const el = document.getElementById('status');
  el.style.display = 'block';
  el.style.color = error ? '#FF3D00' : '#00C853';
  el.textContent = msg;
  setTimeout(() => el.style.display = 'none', 3000);
}

// Init
loadHealth();
loadMatches();
setInterval(loadHealth, 10000);
</script>
</body>
</html>
